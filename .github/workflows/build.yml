name: Application

on:
  push:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        working-directory: app-go
        run: go mod download

      - name: Test
        working-directory: app-go
        run: go test -v ./...

      - name: Build
        working-directory: app-go
        run: go build -v -o build/hue2mqtt .

      - name: Build container
        run: docker compose build
